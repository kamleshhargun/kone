<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #f4f6f9;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-bottom: 15px;
}

#reader video {
  width: 100% !important;
  height: 220px !important;
  object-fit: cover;
  border-radius: 10px;
}

button {
  padding: 12px;
  margin: 6px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.start { background: #28a745; color: #fff; }
.next { background: #007bff; color: #fff; }
.stop { background: #dc3545; color: #fff; }

.mode-toggle {
  display: flex;
  gap: 10px;
}

.mode-btn {
  flex: 1;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 10px;
  background: #ddd;
}

.mode-btn.active {
  background: #007bff;
  color: #fff;
}

#status {
  font-weight: bold;
  margin-top: 10px;
}

.dashboard span {
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Scanner System</h2>

<!-- DASHBOARD -->
<div class="card dashboard">
📊 Today<br>
Pickup: <span id="pickupCount">0</span> |
Return: <span id="returnCount">0</span>
</div>

<!-- MODE -->
<div class="card">
  <div class="mode-toggle">
    <button id="pickupBtn" class="mode-btn active" onclick="setMode('Pickup')">📦 Pickup</button>
    <button id="returnBtn" class="mode-btn" onclick="setMode('Return')">↩ Return</button>
  </div>
</div>

<!-- CAMERA -->
<div class="card">
  <div id="reader"></div>

  <button id="startBtn" class="start" onclick="startOrder()">Start</button>
  <button id="nextBtn" class="next" onclick="startTracking()" style="display:none;">Next</button>
  <button class="stop" onclick="stopScan()">Stop</button>

  <div id="status">Ready</div>
</div>

</div>

<script>
let html5QrCode;
let orderId = "";
let mode = "Pickup";

const API_URL = "https://script.google.com/macros/s/AKfycbxnW9V63PUjacF2w-9tVAsaOb6vMrf6XuMowfttVTp_iVpgHgndNVgWueCKvcwV12FB/exec";

const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// MODE
function setMode(selected) {
  mode = selected;

  pickupBtn.classList.remove("active");
  returnBtn.classList.remove("active");

  if (selected === "Pickup") pickupBtn.classList.add("active");
  else returnBtn.classList.add("active");
}

// START ORDER SCAN
function startOrder() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 25, qrbox: { width: 250, height: 120 } },
    (text) => {
      orderId = text;
      stopScan();

      document.getElementById("status").innerText = "Order Scanned ✅";
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("nextBtn").style.display = "inline-block";
    }
  );

  document.getElementById("status").innerText = "Scan Order ID";
}

// START TRACKING
function startTracking() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 25, qrbox: { width: 250, height: 120 } },
    (text) => {
      let tracking = text;
      stopScan();

      beep.play();
      if (navigator.vibrate) navigator.vibrate(200);

      sendData(orderId, tracking);

      document.getElementById("status").innerText = "✅ Done";

      // RESET
      document.getElementById("startBtn").style.display = "inline-block";
      document.getElementById("nextBtn").style.display = "none";
      orderId = "";
    }
  );

  document.getElementById("status").innerText = "Scan Tracking ID";
}

// STOP
function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop().catch(()=>{});
  }
}

// SEND DATA
function sendData(orderId, tracking) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: mode,
      order_id: orderId,
      tracking: tracking
    })
  })
  .then(res => res.json())
  .then(() => loadDashboard());
}

// DASHBOARD
function loadDashboard() {
  fetch(API_URL + "?mode=dashboard")
  .then(res => res.json())
  .then(data => {
    pickupCount.innerText = data.pickup || 0;
    returnCount.innerText = data.return || 0;
  });
}

loadDashboard();
</script>

</body>
</html>
