<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #f4f6f9;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-bottom: 15px;
}

h2 { margin-bottom: 10px; }

#reader video {
  width: 100% !important;
  height: 220px !important;
  object-fit: cover;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* MODE BUTTONS */
.mode-toggle {
  display: flex;
  gap: 10px;
}

.mode-btn {
  flex: 1;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 10px;
  background: #ddd;
}

.mode-btn.active {
  background: #007bff;
  color: #fff;
}

/* CONTROL BUTTONS */
.start { background: #28a745; color: #fff; }
.stop { background: #dc3545; color: #fff; }
.flash { background: #ffc107; }

#status {
  font-weight: bold;
  margin-top: 10px;
}

.dashboard span {
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h2>📦 Scanner System</h2>

  <!-- DASHBOARD -->
  <div class="card dashboard">
    📊 Today<br>
    Pickup: <span id="pickupCount">0</span> |
    Return: <span id="returnCount">0</span>
  </div>

  <!-- MODE BUTTONS -->
  <div class="card">
    <div class="mode-toggle">
      <button id="pickupBtn" class="mode-btn active" onclick="setMode('Pickup')">📦 Pickup</button>
      <button id="returnBtn" class="mode-btn" onclick="setMode('Return')">↩ Return</button>
    </div>
  </div>

  <!-- CAMERA -->
  <div class="card">
    <div id="reader"></div>

    <button class="start" onclick="startScan()">Start</button>
    <button class="stop" onclick="stopScan()">Stop</button>
    <button class="flash" onclick="toggleFlash()">🔦 Flash</button>

    <div id="status">Ready</div>
  </div>

</div>

<script>
let html5QrCode;
let step = 1;
let orderId = "";
let mode = "Pickup";
let flashOn = false;

const API_URL = "https://script.google.com/macros/s/AKfycbyfw76sFXWY77VK-WGYEcQUrzsFCXMC1KChs_Pak5i27vC_79k0f4izlEMLXgtky80/exec";

// 🔊 SOUND
const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// MODE SWITCH
function setMode(selected) {
  mode = selected;

  document.getElementById("pickupBtn").classList.remove("active");
  document.getElementById("returnBtn").classList.remove("active");

  if (selected === "Pickup") {
    document.getElementById("pickupBtn").classList.add("active");
  } else {
    document.getElementById("returnBtn").classList.add("active");
  }
}

// START SCAN
function startScan() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 25,
      qrbox: { width: 250, height: 120 }
    },
    onScanSuccess
  );

  document.getElementById("status").innerText = "Scan Order ID";
}

// STOP
function stopScan() {
  if (html5QrCode) html5QrCode.stop();
  document.getElementById("status").innerText = "Stopped";
}

// FLASH
function toggleFlash() {
  if (!html5QrCode) return;

  html5QrCode.applyVideoConstraints({
    advanced: [{ torch: !flashOn }]
  });

  flashOn = !flashOn;
}

// SCAN SUCCESS
function onScanSuccess(text) {

  if (step === 1) {
    orderId = text;
    step = 2;
    document.getElementById("status").innerText = "Scan Tracking ID";
  } else {

    let tracking = text;

    beep.play();
    if (navigator.vibrate) navigator.vibrate(200);

    sendData(orderId, tracking);

    step = 1;
    orderId = "";

    document.getElementById("status").innerText = "Scan Next Order ID";
  }
}

// SEND DATA
function sendData(orderId, tracking) {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: mode,
      order_id: orderId,
      tracking: tracking
    })
  })
  .then(res => res.json())
  .then(() => loadDashboard());
}

// DASHBOARD
function loadDashboard() {
  fetch(API_URL + "?mode=dashboard")
  .then(res => res.json())
  .then(data => {
    document.getElementById("pickupCount").innerText = data.pickup || 0;
    document.getElementById("returnCount").innerText = data.return || 0;
  });
}

loadDashboard();
</script>

</body>
</html>
