<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; }

#reader {
  width: 100%;
  max-width: 400px;
  margin: auto;
}

#reader video {
  width: 100% !important;
  height: 250px !important;
  object-fit: cover;
  border-radius: 10px;
}

button { padding: 10px 20px; margin: 10px; }

#status { font-weight: bold; margin: 10px; }

#dashboard {
  background:#f5f5f5;
  padding:10px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<h2>📦 Scanner System</h2>

<!-- DASHBOARD -->
<div id="dashboard">
  <b>📊 Today Dashboard</b><br>
  Pickup: <span id="pickupCount">0</span> |
  Return: <span id="returnCount">0</span>
</div>

<select id="mode">
  <option value="Pickup">Pickup</option>
  <option value="Return">Return</option>
</select>

<br>

<button onclick="startScan()">Start Scan</button>

<div id="status">Step: Scan Order ID</div>

<div id="reader"></div>

<script>
let html5QrCode;
let step = 1;
let orderId = "";
let tracking = "";

const API_URL = "https://script.google.com/macros/s/AKfycbyfw76sFXWY77VK-WGYEcQUrzsFCXMC1KChs_Pak5i27vC_79k0f4izlEMLXgtky80/exec";

// 🔊 SOUND
const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function startScan() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: function(w, h) {
        return {
          width: w * 0.9,
          height: h * 0.4
        };
      }
    },
    onScanSuccess
  ).catch(err => alert("Camera error: Use HTTPS"));
}

function onScanSuccess(text) {
  html5QrCode.stop();

  if (step === 1) {
    orderId = text;
    step = 2;
    document.getElementById("status").innerText = "Step: Scan Tracking ID";
  } else {
    tracking = text;
    step = 1;

    beep.play();

    sendData();

    orderId = "";
    tracking = "";
  }
}

function sendData() {
  let mode = document.getElementById("mode").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: mode,
      order_id: orderId,
      tracking: tracking
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "duplicate") {
      document.getElementById("status").innerHTML =
        "❌ Already Scanned<br>" +
        "First Entry: " + data.date + " " + data.time +
        " (" + data.mode + ")";
    } else {
      document.getElementById("status").innerHTML =
        "✅ Saved<br>" + data.date + " " + data.time;
    }

    loadDashboard();
  });
}

// 📊 DASHBOARD
function loadDashboard() {
  fetch(API_URL + "?mode=dashboard")
  .then(res => res.json())
  .then(data => {
    document.getElementById("pickupCount").innerText = data.pickup;
    document.getElementById("returnCount").innerText = data.return;
  });
}

loadDashboard();
</script>

</body>
</html>
