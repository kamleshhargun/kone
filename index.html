<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:'Segoe UI',Arial; background:#f4f6f9; text-align:center; }
.container { max-width:420px; margin:auto; padding:15px; }
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
button { padding:10px; margin:5px; border:none; border-radius:8px; font-weight:bold; }
.start{background:#28a745;color:#fff;}
.next{background:#007bff;color:#fff;}
.stop{background:#dc3545;color:#fff;}
.manual{background:#444;color:#fff;}
.search{background:#6f42c1;color:#fff;}
.mode-btn { padding:12px; font-size:16px; margin:5px; }
.mode-btn.active { background:#007bff;color:#fff; }
input { padding:10px; width:90%; margin:5px; border-radius:6px; border:1px solid #ccc; }
.stat { display:flex; justify-content:space-between; margin-top:8px; }
.stat span { font-size:18px; font-weight:bold; display:block; }
#manualBox { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Scanner System</h2>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Dashboard</h3>

<div class="stat">
<div>Today Pickup <span id="pickup_today">0</span></div>
<div>Today Return <span id="return_today">0</span></div>
</div>

<div class="stat">
<div>Yesterday Pickup <span id="pickup_yesterday">0</span></div>
<div>Yesterday Return <span id="return_yesterday">0</span></div>
</div>

<div class="stat">
<div>Total Pickup <span id="pickup_total">0</span></div>
<div>Total Return <span id="return_total">0</span></div>
</div>
</div>

<!-- MODE -->
<div class="card">
<button id="pickupBtn" class="mode-btn active" onclick="setMode('Pickup')">📦 Pickup</button>
<button id="returnBtn" class="mode-btn" onclick="setMode('Return')">↩ Return</button>
</div>

<!-- CAMERA -->
<div class="card">
<div id="reader"></div>

<button class="start" onclick="startOrder()">Start</button>
<button class="next" onclick="startTracking()" id="nextBtn" style="display:none;">Next</button>
<button class="stop" onclick="stopScan()">Stop</button>
<button class="manual" onclick="openManual()">Manual</button>

<div id="status">Ready</div>
</div>

<!-- MANUAL -->
<div class="card" id="manualBox">
<h3>Manual Entry</h3>
<input id="manualOrder" placeholder="Order ID">
<input id="manualTracking" placeholder="Tracking ID">
<button onclick="submitManual()">Submit</button>
</div>

<!-- 🔍 LOOKUP -->
<div class="card">
<h3>🔍 Order Lookup</h3>
<input id="lookupInput" placeholder="Order ID">
<button class="search" onclick="searchOrder()">Search</button>
<button class="stop" onclick="clearSearch()">Clear</button>
<div id="lookupResult"></div>
</div>

<!-- 📦 TRACKING -->
<div class="card">
<h3>📦 Order Tracking</h3>
<input id="trackOrderId" placeholder="Order ID">
<input id="trackWaybill" placeholder="Waybill">
<button class="search" onclick="trackOrder()">Track</button>

<div id="trackResult"></div>

<button class="start" id="saveBtn" onclick="saveTracking()" style="display:none;">Save</button>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyeb87YRSiiNBh_Gjvd84RTWCoONrxrTBRk77ez9Zc1XcGKirPrLGdzKNQQTW_hgR7o/exec"; // 🔥 IMPORTANT

let html5QrCode;
let orderId="";
let mode="Pickup";
let trackingData=null;

const beep=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// MODE
function setMode(m){
mode=m;
pickupBtn.classList.remove("active");
returnBtn.classList.remove("active");
if(m==="Pickup") pickupBtn.classList.add("active");
else returnBtn.classList.add("active");
}

// CAMERA
function startOrder(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25,qrbox:{width:250,height:120}},
text=>{
orderId=text;
stopScan();
status.innerText="Order Scanned ✅";
nextBtn.style.display="inline-block";
});
}

function startTracking(){
html5QrCode=new Html5Qrcode("reader");
html5QrCode.start({facingMode:"environment"},{fps:25,qrbox:{width:250,height:120}},
text=>{
let tracking=text;
stopScan();
beep.play();
sendData(orderId,tracking);
status.innerText="Done ✅";
nextBtn.style.display="none";
orderId="";
});
}

function stopScan(){
if(html5QrCode) html5QrCode.stop().catch(()=>{});
}

// MANUAL
function openManual(){ manualBox.style.display="block"; }

function submitManual(){
let order=manualOrder.value.trim();
let tracking=manualTracking.value.trim();
if(!order||!tracking){alert("Fill both");return;}
beep.play();
sendData(order,tracking);
manualOrder.value="";
manualTracking.value="";
manualBox.style.display="none";
}

// SEND
function sendData(order,tracking){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
mode:mode.toLowerCase(),
order_id:order,
tracking:tracking
})
}).then(()=>loadDashboard());
}

// DASHBOARD
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{
pickup_today.innerText=d.todayPickup||0;
pickup_yesterday.innerText=d.yesterdayPickup||0;
pickup_total.innerText=d.totalPickup||0;
return_today.innerText=d.todayReturn||0;
return_yesterday.innerText=d.yesterdayReturn||0;
return_total.innerText=d.totalReturn||0;
});
}

// LOOKUP
function searchOrder(){
let order=lookupInput.value.trim();
if(!order){alert("Enter Order ID");return;}

fetch(API_URL+"?type=lookup&order_id="+encodeURIComponent(order))
.then(res=>res.json())
.then(data=>{
lookupResult.innerHTML="";
if(!data.length){lookupResult.innerHTML="No Data";return;}
data.forEach(item=>{
lookupResult.innerHTML+=`<div><b>${item.order_id}</b> - ${item.product}</div>`;
});
});
}

function clearSearch(){
lookupInput.value="";
lookupResult.innerHTML="";
}

// TRACK
function trackOrder(){
let order=trackOrderId.value.trim();
let tracking=trackWaybill.value.trim();

if(!order||!tracking){alert("Enter both");return;}

trackResult.innerHTML="Loading...";

fetch(API_URL+"?type=track&order_id="+order+"&tracking="+tracking)
.then(res=>res.json())
.then(d=>{

if(d.error){trackResult.innerHTML=d.error;return;}

trackingData=d;

trackResult.innerHTML=`
<b>Status:</b> ${d.status}<br>
<b>Location:</b> ${d.location}<br>
<b>Customer:</b> ${d.customer}<br>
<b>State:</b> ${d.state}<br>
<b>Payment:</b> ${d.payment}<br>
<b>Amount:</b> ₹${d.amount}
`;

saveBtn.style.display="inline-block";

});
}

// SAVE
function saveTracking(){

if(!trackingData){alert("No data");return;}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"saveTracking",
order_id:trackingData.order_id,
tracking:trackingData.tracking,
status:trackingData.status,
location:trackingData.location,
customer:trackingData.customer,
state:trackingData.state,
amount:trackingData.amount,
payment:trackingData.payment
})
})
.then(()=>{

alert("Saved ✅");
saveBtn.style.display="none";

});
}

// AUTO LOAD
setInterval(loadDashboard,3000);
loadDashboard();

</script>

</body>
</html>
